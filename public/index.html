    <meta name="keywords" content="web design, website maker, react, tailwindcss, SEO, GEO, AIO, modern websites, fast websites, web development" />

    <meta property="og:description" content="Speedy and modern websites built with React & TailwindCSS. SEO, GEO, and AIO integration included." />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>web人 - Modern Web Solutions | 現代化網站 | Solusi Web Modern</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#0ea5e9',
                dark: '#0284c7',
                light: '#38bdf8'
              },
              accent: {
                DEFAULT: '#f97316',
                dark: '#c2410c',
                light: '#fb923c'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
  
  <!-- i18n Language Script -->
  <script>
    window.i18n = {
      currentLang: localStorage.getItem('lang') || 'en',
      
      translations: {
        en: {
          title: "web人 | Modern Web Solutions",
          heroTitle: "Build Your Dream Website",
          heroSubtitle: "Fast, modern & responsive websites",
          ctaPrimary: "Get Started",
          ctaSecondary: "Learn More"
        },
        zh: {
          title: "web人 | 現代化網站解決方案",
          heroTitle: "打造您的夢想網站",
          heroSubtitle: "快速、現代、響應式網站",
          ctaPrimary: "開始使用",
          ctaSecondary: "了解更多"
        },
        id: {
          title: "web人 | Solusi Web Modern",
          heroTitle: "Bangun Website Impian Anda",
          heroSubtitle: "Website cepat, modern & responsif",
          ctaPrimary: "Mulai Sekarang",
          ctaSecondary: "Pelajari Lebih Lanjut"
        }
      },
      
      t(key) {
        return this.translations[this.currentLang]?.[key] || 
               this.translations['en'][key] || key;
      },
      
      setLang(lang) {
        this.currentLang = lang;
        localStorage.setItem('lang', lang);
        document.documentElement.lang = lang === 'zh' ? 'zh-TW' : lang;
        window.dispatchEvent(new Event('languageChange'));
      }
    };
    
    // Set initial language
    document.documentElement.lang = window.i18n.currentLang === 'zh' ? 'zh-TW' : window.i18n.currentLang;
  </script>
</html>
